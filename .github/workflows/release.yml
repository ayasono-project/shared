name: Release Check

# 配布は「git タグ + コミット済み dist」方式。consumer は github:ayasono-project/shared#vX.Y.Z で取り込む。
# タグ push 時に、コミット済み dist が最新ビルドと一致するか（stale 検出）と lint/typecheck/test を検証する。
# tarball の生成・Release 添付は行わない。

on:
  push:
    tags:
      - "v*"

jobs:
  verify:
    name: Verify committed dist & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: 依存関係のインストール
        run: pnpm install --frozen-lockfile

      - name: ビルド
        run: pnpm build

      - name: コミット済み dist が最新ビルドと一致するか検証（stale 検出）
        run: |
          if [ -n "$(git status --porcelain -- dist)" ]; then
            echo "::error::コミット済み dist が最新ビルドと一致しません。pnpm build して dist をコミットし直してからタグを切り直してください。"
            git status --porcelain -- dist
            exit 1
          fi

      - name: リント
        run: pnpm lint

      - name: 型チェック
        run: pnpm typecheck

      - name: テスト実行
        run: pnpm test
